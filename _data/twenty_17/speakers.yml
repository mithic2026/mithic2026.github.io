  topic: Application of multivariate information theory to complex systems data
  description: In this talk we will explore the critical aspects surrounding the application of multivariate information theory to complex systems data. The talk will cover a range of relevant issues like how to choose a suitable measure and how to estimate it properly, as well as experimental considerations like bias and significance testing. We will conclude by showcasing a few recent examples of multivariate information theory applied to complex systems, and more specifically as a substrate-agnostic bridge between information processing in biological and artificial neural networks.

- title: Fernando Rosas
  name: Fernando_Rosas
  affiliation: University of Sussex
  position: Assistant Professor in Computer Science & AI
  img: Fernando_Rosas.jpeg
  scholar: https://scholar.google.com/citations?user=OZNAs2wAAAAJ&hl=en&oi=ao
  personal-website: https://profiles.sussex.ac.uk/p555273-fernando-rosas
  thumbnail: Fernando_Rosas.jpeg
  alt: Picture of Fernando Rosas
  topic: Theoretical foundations of multivariate information measures
  description: In this talk we will develop a foundational understanding of multivariate information measures and their role in characterising complex systems. We will introduce key quantities such as O-information, S-information, and Interaction Information, focusing on their derivation, interpretation, and underlying intuition. The lecture will highlight how these measures capture different modes of statistical dependence, including redundancy and synergy, in multivariate settings. Overall, the goal is to provide participants with a clear conceptual and mathematical basis that will support subsequent applications explored during the workshop.